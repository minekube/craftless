[tools]
java = "temurin-21.0.11+10.0.LTS"
gradle = "9.6.0"
bun = "1.3.14"

[tasks.jvm-test]
description = "Run the Kotlin/JVM test suite"
run = "mise exec -- gradle test"

[tasks.lint]
description = "Run Kotlin formatting and static-analysis checks"
run = "mise exec -- gradle lint"

[tasks.lint-fix]
description = "Auto-format Kotlin sources with ktlint"
run = "mise exec -- gradle lintFormat"

[tasks.playwright-test]
description = "Run the Playwright integration helper tests"
run = "mise exec -- bun test playwright"

[tasks.architecture-check]
description = "Run focused checks for live OpenAPI/action architecture"
run = [
    "mise exec -- gradle :protocol:test",
    "mise exec -- gradle :daemon:test",
    "mise exec -- gradle :cli:test",
    "mise exec -- gradle :driver-fabric:test",
    "mise exec -- bun test playwright",
]

[tasks.package-cli]
description = "Build Craftless CLI release archives and Docker context"
run = [
    "rm -f cli/build/distributions/craftless-*.zip cli/build/distributions/craftless-*.tar",
    "mise exec -- gradle :cli:distZip :cli:distTar",
    "rm -rf build/docker/craftless",
    "mkdir -p build/docker/craftless",
    "tar -xf cli/build/distributions/craftless-*.tar -C build/docker/craftless --strip-components=1",
]

[tasks.ci]
description = "Run all repository verification checks"
run = [
    "mise exec -- gradle lint",
    "mise exec -- gradle test",
    "mise exec -- bun test playwright",
]
