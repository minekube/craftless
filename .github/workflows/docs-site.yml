name: docs-site

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/docs-site.yml"
      - ".mise.toml"
      - "docs-site/**"
      - "protocol/src/main/kotlin/com/minekube/craftless/protocol/**"
      - "protocol/build.gradle.kts"
      - "settings.gradle.kts"
      - "build.gradle.kts"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - name: Detect Cloudflare deploy token
        id: cloudflare-token
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=Skipping Cloudflare deploy::Add a CLOUDFLARE_API_TOKEN repository secret with Account Settings Read, Workers Scripts Write, Workers Routes Write, and Zone Read permissions to enable automatic deploys."
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: jdx/mise-action@v4
        with:
          install: true
          cache: true
      - name: Verify docs site
        if: steps.cloudflare-token.outputs.present != 'true'
        run: |
          mise run docs-site-build
          cd docs-site
          mise exec -- bun run typecheck
      - name: Verify docs site deploy
        if: steps.cloudflare-token.outputs.present == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise run docs-site-verify
      - name: Deploy to Cloudflare Workers
        if: steps.cloudflare-token.outputs.present == 'true'
        working-directory: docs-site
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: mise exec -- bun run deploy
